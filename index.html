<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord</title>
  <style>
    body{margin:0;font-family:Segoe UI,sans-serif;background:#36393f;color:#fff;display:flex;height:100vh;overflow:hidden}
    .sidebar{width:240px;background:#2f3136;padding:15px;display:flex;flex-direction:column;box-sizing:border-box}
    .sidebar h3{color:#8e9297;font-size:12px;margin:0 0 10px;text-transform:uppercase}
    .channel,.edit-profile,.admin-panel,button{cursor:pointer}
    .channel{padding:6px 10px;border-radius:4px;color:#b9bbbe;transition:.15s;user-select:none}
    .channel:hover{background:#40444b;color:#fff}
    .edit-profile{margin-top:8px;background:#40444b;text-align:center;padding:8px;border-radius:4px;user-select:none}
    .edit-profile:hover{background:#5865f2}
    .admin-panel{margin-top:auto;margin-bottom:8px;background:#5865f2;text-align:center;padding:8px;border-radius:4px;user-select:none;display:none}
    .admin-panel:hover{background:#4752c4}
    .chat{flex:1;display:flex;flex-direction:column;min-width:0}
    .header{padding:15px;background:#2f3136;font-weight:bold;border-bottom:1px solid #202225}
    .messages{flex:1;padding:20px;overflow-y:auto;box-sizing:border-box}
    .message{margin-bottom:10px}
    .message-row{display:flex;align-items:flex-start;gap:8px}
    .avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;background:#5865f2;flex-shrink:0;margin-top:2px;border:1px solid rgba(255,255,255,.15)}
    .message-content{line-height:1.35;word-break:break-word;white-space:normal}
    .username{font-weight:bold;color:#7289da}
    .input-area{padding:10px 15px;background:#40444b;display:flex;gap:10px}
    input{flex:1;padding:10px;border-radius:4px;border:none;background:#303339;color:#fff;outline:none}
    button{padding:10px 16px;border-radius:4px;border:none;background:#7289da;color:#fff}
    .typing-indicator{font-size:12px;color:#b9bbbe;margin:0 0 8px 15px;font-style:italic}
    .shop-btn{background:#43b581;margin:5px 0;padding:8px 16px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center}
    .overlay-box{width:min(980px,96vw);height:min(680px,92vh);background:#1e1f22;border-radius:12px;position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    .overlay-box iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
    .close-btn{position:absolute;top:10px;right:10px;z-index:10001;width:40px;height:40px;border-radius:50%;border:none;background:#7289da;color:#fff;font-size:20px}
    .game-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin:20px 0}
    .game-card{padding:15px;background:#2f3136;border:1px solid #202225;border-radius:8px;text-align:center}
    .game-card h4{margin:0 0 10px;font-size:16px;color:#fff}
    .game-card button{width:100%;margin:5px 0}
    .games-header{padding:20px;background:#2f3136;border-bottom:1px solid #202225;text-align:center;font-size:18px;font-weight:bold;color:#fff;margin-bottom:15px}
    .game-chat-btn{background:#5865f2;padding:8px 16px !important;font-size:14px !important;border-radius:6px !important;margin:10px auto !important;display:block;width:120px}
    .game-chat-btn:hover{background:#4752c4 !important}
    .back-btn{background:#7289da;padding:8px 16px !important;font-size:14px !important;border-radius:6px !important;margin:15px auto !important;display:block;width:140px}
  </style>
</head>
<body>
  <div class="sidebar">
    <h3>TEXT CHANNELS</h3>
    <div class="channel" data-channel="general"># general</div>
    <div class="channel" data-channel="gaming"># gaming</div>
    <div class="channel" data-channel="coding"># coding</div>
    <div class="channel" data-channel="suggestions"># suggestions</div>
    <div class="channel" data-channel="adaminchat" id="adminChatChannel" style="display:none;"># ad da min chat</div>
    <div class="channel" data-channel="stats"># stats</div>
    <div class="channel" data-channel="shop"># shop</div>
    <div class="admin-panel" id="adminPanelBtn"> Admin Panel</div>
    <div class="edit-profile" id="editProfileBtn"> Edit Profile</div>
  </div>

  <div class="chat">
    <div class="header" id="channelName"># general</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="messageInput" placeholder="Message #general" />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://adrusttuicogkeplrcac.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcnVzdHR1aWNvZ2tlcGxyY2FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5NDQxMjUsImV4cCI6MjA4NjUyMDEyNX0.XnfYHjY0lR5JMBX855xsOtiC44oOW_bRtZbGmSo8ZB0"
    );

    const $ = id => document.getElementById(id);
    let currentChannel = 'general', currentThreadId = null, loadToken = 0, username = '';
    const avatarCache = new Map();

    const defaultProfile = {xp:0,level:1,coins:0,profile_picture:null,muted:false,owned_snake:false,owned_slope:false,owned_bartblast:false,owned_sls:true,is_admin:false};

    username = localStorage.getItem('username') || '';
    if (!username) {
      while (!username) username = prompt('Enter username:');
      localStorage.setItem('username', username);
      await supabase.from('profiles').upsert({ username, ...defaultProfile });
    }

    const fallback = n => `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=7289da&color=fff&rounded=true&size=64`;

    async function getProfile(name) {
      const { data } = await supabase.from('profiles').select('*').eq('username', name).single();
      return data || {};
    }

    async function saveProfile(profile) {
      await supabase.from('profiles').upsert(profile);
    }

    async function getAvatar(name) {
      if (avatarCache.has(name)) return avatarCache.get(name);
      const p = await getProfile(name);
      const url = p.profile_picture || fallback(name);
      avatarCache.set(name, url);
      return url;
    }

    async function addMessage(user, text, avatarUrl = null) {
      const avatar = avatarUrl || await getAvatar(user);
      const safeText = String(text).replace(/\\n/g, '<br>');
      const div = document.createElement('div');
      div.className = 'message';
      div.innerHTML = `
        <div class="message-row">
          <img class="avatar" src="${avatar}" alt="avatar" onerror="this.onerror=null; this.src='${fallback(user)}'">
          <div class="message-content">
            <span class="username">${user}</span> ${safeText}
          </div>
        </div>`;
      $('messages').appendChild(div);
      $('messages').scrollTop = $('messages').scrollHeight;
    }

    function setHeader(channel, thread = null) {
      const names = {stats: '# stats', shop: '# shop', suggestions: '# suggestions', gaming: '# gaming', adaminchat: '# ad da min chat'};
      $('channelName').textContent = thread ? `${names[channel] || `# ${channel}`} → ${thread}` : names[channel] || `# ${channel}`;
      $('messageInput').placeholder = ['stats','shop'].includes(channel) ? '' : `Message ${thread ? `${thread} in #${channel}` : `#${channel}`}`;
      $('messageInput').disabled = false;
      $('sendBtn').style.display = 'inline-block';
    }

    async function loadGaming(token = ++loadToken) {
      if (token !== loadToken || currentChannel !== 'gaming') return;
      
      const p = await getProfile(username);
      $('messages').innerHTML = `
        <div class="games-header">🎮 Play Games</div>
        <button class="game-chat-btn" id="gameChatBtn">Game Chat</button>
        <div class="game-grid">
          ${gameCard('🐍 Snake Game', 'playSnakeBtn', 25, 'owned_snake')}
          ${gameCard('📈 Slope Game', 'playSlopeBtn', 50, 'owned_slope')}
          ${gameCard('🎯 Bart Blast', 'playBartBtn', 75, 'owned_bartblast')}
          ${gameCard('⚽ Super Liquid Soccer', 'playSlsBtn', 0, 'owned_sls', true)}
        </div>`;

      setupGameBtns(p);
      $('gameChatBtn').onclick = () => enterGamesChat();
    }

    function gameCard(title, btnId, price, ownedKey, free = false) {
      return `<div class="game-card"><h4>${title}</h4><button class="shop-btn" id="${btnId}">${free?'Play (Free)':'Buy ('+price+' coins)'}</button></div>`;
    }

    function setupGameBtns(p) {
      const games = [
        {id: 'playSnakeBtn', owned: 'owned_snake', price: 25, open: () => openFrame('https://frogdafish.github.io/Snek')},
        {id: 'playSlopeBtn', owned: 'owned_slope', price: 50, open: () => openFrame('slope.html')},
        {id: 'playBartBtn', owned: 'owned_bartblast', price: 75, open: () => openFrame('bartblast.html')},
        {id: 'playSlsBtn', owned: 'owned_sls', price: 0, open: () => openFrame('https://blueskywrld.github.io/game3/')}
      ];

      games.forEach(g => {
        const btn = $(g.id);
        if (btn && (p[g.owned] || g.price === 0)) {
          btn.textContent = 'Play (Fullscreen)';
          btn.onclick = g.open;
        } else if (btn) {
          btn.onclick = () => buyGame(g.id, g.price, g.owned);
        }
      });
    }

    async function buyGame(btnId, price, ownedKey) {
      const p = await getProfile(username);
      if (p.coins < price) return alert(`Need ${price} coins!`);
      p.coins -= price;
      p[ownedKey] = true;
      await saveProfile(p);
      alert('Purchased!');
      loadGaming(++loadToken);
    }

    async function enterGamesChat() {
      currentThreadId = 'games-chat';
      setHeader('gaming', 'Game Chat');
      $('messages').innerHTML = `<button class="back-btn" onclick="switchChannel('gaming')">← Back to Games</button>`;
      await loadMessages('gaming', 'games-chat');
    }

    async function loadMessages(channel, threadId = null, token = ++loadToken) {
      if (token !== loadToken || channel !== currentChannel || threadId !== currentThreadId) return;
      
      // ONLY back button in gaming chat thread - NO headers anywhere
      const backButtonHtml = (channel === 'gaming' && threadId === 'games-chat') ? 
        '<button class="back-btn" onclick="switchChannel(\'gaming\')">← Back to Games</button>' : '';
      
      $('messages').innerHTML = backButtonHtml;
      
      const query = supabase.from('messages').select('*').eq('channel', channel).order('created_at', { ascending: true }).limit(50);
      if (threadId) query.eq('thread_id', threadId);
      else query.is('thread_id', null);
      
      const { data: msgs } = await query;
      
      if (!msgs?.length) return addMessage('System', threadId === 'games-chat' ? 'Welcome to game chat!' : 'No messages yet.');
      for (const m of msgs) await addMessage(m.username, m.text);
    }

    async function loadStats(token = ++loadToken) {
      if (token !== loadToken || currentChannel !== 'stats') return;
      const p = await getProfile(username);
      $('messages').innerHTML = '';
      await addMessage('System', `${p.username}<br><strong>Level:</strong> ${p.level}<br><strong>XP:</strong> ${p.xp}<br><strong>Coins:</strong> ${p.coins}`);
    }

    async function loadShop(token = ++loadToken) {
      if (token !== loadToken || currentChannel !== 'shop') return;
      $('messages').innerHTML = '<div class="message" style="text-align:center;color:#b9bbbe">🛒 Games in #gaming!</div>';
    }

    function openFrame(src) {
      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.innerHTML = `<div class="overlay-box"><button class="close-btn" onclick="this.parentElement.parentElement.remove()">×</button><iframe src="${src}"></iframe></div>`;
      document.body.appendChild(overlay);
    }

    async function sendMessage() {
      const text = $('messageInput').value.trim();
      if (!text || ['stats','shop'].includes(currentChannel)) return;
      
      const p = await getProfile(username);
      if (p.muted) return alert('You are muted!');
      
      const msg = {channel: currentChannel, username, text, created_at: new Date().toISOString(), thread_id: currentThreadId || null};
      const { error } = await supabase.from('messages').insert(msg);
      if (error) return alert('Send failed.');
      
      $('messageInput').value = '';
      await addMessage(username, text);
    }

    async function switchChannel(channel) {
      currentChannel = channel;
      currentThreadId = null;
      setHeader(channel);
      $('messages').innerHTML = '';
      const token = ++loadToken;
      
      if (channel === 'stats') await loadStats(token);
      else if (channel === 'shop') await loadShop(token);
      else if (channel === 'gaming') await loadGaming(token);
      else await loadMessages(channel, null, token);
    }

    $('sendBtn').onclick = sendMessage;
    $('messageInput').onkeydown = e => e.key === 'Enter' && sendMessage();
    document.querySelectorAll('.channel').forEach(el => el.onclick = () => switchChannel(el.dataset.channel));

    async function refreshAdmin() {
      const p = await getProfile(username);
      $('adminChatChannel').style.display = p.is_admin ? 'block' : 'none';
      $('adminPanelBtn').style.display = p.is_admin ? 'block' : 'none';
    }

    await refreshAdmin();
    switchChannel('general');
  </script>
</body>
</html>
